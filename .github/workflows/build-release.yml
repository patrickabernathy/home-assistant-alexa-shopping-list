name: Build Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:


  docker:
    name: Build Server Container
    runs-on: ubuntu-latest
    steps:
      - name: Set version
        run: echo "IMAGE_VERSION=$(date +"%y%m.%j.%H")" >> $GITHUB_ENV
      - name: Show version number
        run: echo "Building release for version - $IMAGE_VERSION"

      - name: Check out code
        uses: actions/checkout@v3

      - name: Lowercase image namespace
        run: echo "IMAGE_NAMESPACE=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          context: ./server/
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/ha-alexa-shopping-list-sync:${{ env.IMAGE_VERSION }}
            ghcr.io/${{ env.IMAGE_NAMESPACE }}/ha-alexa-shopping-list-sync:latest
